specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Deezer
providerId: deezer
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- Music
- Streaming
- Audio
- OAuth
- Catalog
- Playlists
- Plans
description: >-
  Deezer's public API is free for registered apps. There is no per-call fee. Consumer subscriptions
  (Deezer Free, Premium, Family, HiFi, Student) apply to listeners and govern playback rights but are
  independent of API access. Full-track streaming via the API requires the user to be a paid
  subscriber.
notes: API is free; full-track streaming requires user subscription.
sources:
- https://developers.deezer.com/
- https://www.deezer.com/offers
plans:
- id: deezer-developer
  name: Deezer API (Developer)
  type: free
  description: Free public REST API. Public catalog endpoints are unauthenticated; user-library and playback need OAuth.
  entries:
  - label: API Access
    name: api_access
    type: flat
    metric: requests
    limit: -1
    timeFrame: usage
    geo: global
    unit: 1
    price: 0
    userMultiplied: false
  elements:
  - name: Public catalog (unauthenticated)
  - name: OAuth 2.0 for user scope
- id: deezer-consumer
  name: Deezer Consumer Subscriptions
  type: subscription
  description: Deezer's consumer plans (Free, Premium, Family, HiFi, Student); required on the user side for full playback through API.
  entries:
  - label: Subscription
    name: consumer_sub
    type: flat
    metric: month
    limit: -1
    timeFrame: monthly
    geo: global
    unit: 1
    price: see https://www.deezer.com/offers
    userMultiplied: false
  elements:
  - name: Free, Premium, Family, HiFi, Student tiers
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
