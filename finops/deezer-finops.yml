specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Deezer
providerId: deezer
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- Music
- Streaming
- Audio
- OAuth
- Catalog
- Playlists
- FinOps
- Cost Management
- FOCUS
description: >-
  FOCUS-aligned FinOps profile for Deezer. API access is free and not invoiced. Cost concentration is
  on the consumer subscription side (Premium, Family, HiFi, Student), which is billed directly by
  Deezer to end users.
notes: API is free; consumer subscriptions billed to end users by Deezer.
sources:
- https://developers.deezer.com/
- https://www.deezer.com/offers
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Deezer
serviceCategory: Music Streaming
billingModel:
  pricingCategory: Free / Subscription
  billingFrequency: Monthly (consumer)
  billingCurrency: EUR/USD
  chargeCategories:
  - Subscription
focusColumns:
  ServiceName: Deezer API
  ServiceCategory: Music Streaming
  ProviderName: Deezer
  PublisherName: Deezer
  InvoiceIssuerName: Deezer
  BillingCurrency: EUR
  ChargeCategory: Subscription
meters:
- name: api_requests
  description: API request count (free; observability only).
  unit: request
  aggregation: sum
  dimensions:
  - app
  - endpoint
- name: consumer_subscription
  description: Deezer consumer subscription billing.
  unit: month
  aggregation: count
  dimensions:
  - tier
  - country
principles:
- name: Visibility
  description: No API invoice; track usage internally for performance and quota planning.
- name: Allocation
  description: Allocate any consumer subscriptions to the team or program owning them.
- name: Optimization
  description: Cache catalog responses to stay under the 50 req / 5s ceiling.
- name: Accountability
  description: App owner manages the Deezer developer registration and OAuth client.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
