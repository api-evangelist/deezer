specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Deezer
providerId: deezer
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- Music
- Streaming
- Audio
- OAuth
- Catalog
- Playlists
- Rate Limiting
- Quotas
- Throttling
description: >-
  Deezer publishes a global limit of 50 requests per 5 seconds per IP/app on the public REST API.
  Exceeding the limit returns HTTP 4xx with an error code. There is no documented daily quota.
notes: 50 requests / 5 seconds is the documented baseline.
sources:
- https://developers.deezer.com/api
responseCodes:
  throttled: 429
limits:
- name: Default
  scope: ip-or-app
  metric: requests
  limit: 50 per 5 seconds
  notes: Documented rate-limit baseline.
policies:
- name: Backoff Strategy
  description: Sleep at least 100ms between bursts; on rate-limit errors apply exponential backoff with jitter.
- name: Caching
  description: Cache catalog responses; track/album metadata is stable and rarely needs re-fetching.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
